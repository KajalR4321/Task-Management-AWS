AWSTemplateFormatVersion: '2010-09-09'
Description: TaskFlow - Serverless Task Management App

Resources:
  TaskFlowTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: taskflow-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  AttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'taskflow-attachments-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3000

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: taskflow-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: taskflow-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:Query, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:GetItem]
                Resource: !GetAtt TaskFlowTable.Arn
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub '${AttachmentsBucket.Arn}/*'

Outputs:
  TableName:
    Value: !Ref TaskFlowTable
  BucketName:
    Value: !Ref AttachmentsBucket
